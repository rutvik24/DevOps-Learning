services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-api-prod
    restart: always
    environment:
      PORT: 8080
      ENV: production
      # Point to AWS RDS in production
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://your-frontend-domain.com}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
